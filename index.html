<!DOCTYPE html>
<html lang="de">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabians Quiz</title>
  <style>
    :root {
      --primary-color: #3f51b5;
      --accent-color: #ff4081;
      --bg-color: #f5f5f5;
      --card-bg: #ffffff;
      --text-color: #333;
      --disabled-color: #b0bec5;
      --success-color: #4caf50;
      --error-color: #f44336;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .main-container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .header-panel {
      background-color: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      margin-bottom: 15px;
      text-align: center;
    }

    #progress-container {
      width: 100%;
      background-color: #e0e0e0;
      height: 10px;
      border-radius: 5px;
      margin: 10px 0;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background-color: var(--success-color);
      width: 0%;
      transition: width 0.3s ease-in-out;
    }

    .stats-text {
      font-size: 14px;
      margin: 0;
      color: #757575;
    }

    .screen {
      display: none;
      flex-direction: column;
      flex-grow: 1;
    }

    h2, h3 {
      margin-top: 0;
      color: var(--primary-color);
      text-align: center;
    }

    .kat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 10px 0;
    }

    .kat-btn {
      background-color: var(--card-bg);
      border: none;
      border-radius: 15px;
      height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.1s;
      padding: 10px;
    }

    .kat-btn:active { transform: scale(0.97); }

    .kat-btn.disabled {
      background-color: var(--disabled-color);
      color: #fff;
      pointer-events: none;
      box-shadow: none;
      opacity: 0.6;
    }

    .symbol { font-size: 40px; margin-bottom: 8px; }
    .kat-name { font-size: 15px; font-weight: bold; text-align: center; line-height: 1.2; }

    .frage-card {
      background-color: var(--card-bg);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .quiz-img-container {
      width: 100%;
      background-color: #eee;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      min-height: 150px;
    }

    .quiz-img {
      width: 100%;
      height: auto;
      max-height: 40vh;
      object-fit: contain;
      display: block;
      opacity: 0;
      transition: opacity 0.3s ease-in;
    }

    #frage-text {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 20px;
      text-align: center;
      width: 100%;
    }

    .opt-btn {
      background-color: #fff;
      border: 2px solid var(--primary-color);
      color: var(--primary-color);
      border-radius: 10px;
      padding: 14px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      text-align: left;
    }

    .opt-btn.correct {
      background-color: var(--success-color) !important;
      border-color: var(--success-color) !important;
      color: white !important;
    }

    .opt-btn.wrong {
      background-color: var(--error-color) !important;
      border-color: var(--error-color) !important;
      color: white !important;
    }

    .opt-letter {
      font-weight: bold;
      margin-right: 12px;
      min-width: 20px;
      background: rgba(0,0,0,0.1);
      padding: 2px 6px;
      border-radius: 4px;
    }

    #result-card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .result-score {
      font-size: 48px;
      color: var(--success-color);
      font-weight: bold;
      margin: 20px 0;
    }

    .restart-btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    #loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary-color);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Synchronisiere Daten...</div>
    <div id="loading-subtext" style="font-size: 12px; color: #999; margin-top: 5px;">Bilder werden für flüssiges Spielen vorgeladen...</div>
  </div>

  <div class="main-container">
    <div class="header-panel">
      <div id="progress-container"><div id="progress-bar"></div></div>
      <p class="stats-text">
        Frage: <span id="answered-count" style="font-weight:bold; color:#333;">0</span> / 30 | 
        Richtig: <span id="score" style="font-weight:bold; color:var(--success-color);">0</span>
      </p>
    </div>

    <div id="screen-kat" class="screen">
      <h2>Wähle ein Thema</h2>
      <div id="kat-list" class="kat-grid"></div>
    </div>

    <div id="screen-frage" class="screen">
      <div class="frage-card">
        <h3 id="frage-kat-title">Kategorie</h3>
        <div id="img-container" class="quiz-img-container">
          <img id="frage-img" class="quiz-img" src="" alt="Quiz Bild">
        </div>
        <p id="frage-text">Lade Frage...</p>
        <button id="btn-A" class="opt-btn" onclick="handleSelect('A')"><span class="opt-letter">A</span> <span id="optA"></span></button>
        <button id="btn-B" class="opt-btn" onclick="handleSelect('B')"><span class="opt-letter">B</span> <span id="optB"></span></button>
        <button id="btn-C" class="opt-btn" onclick="handleSelect('C')"><span class="opt-letter">C</span> <span id="optC"></span></button>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div id="result-card">
        <div style="font-size: 60px;">🎉</div>
        <h2>Fertig!</h2>
        <p>Du hast das Quiz beendet.</p>
        <div class="result-score"><span id="final-score">0</span> / 30</div>
        <p id="result-comment">Super Leistung!</p>
        <button class="restart-btn" onclick="location.reload()">Nochmal spielen</button>
      </div>
    </div>
  </div>

  <script>
    // Konfiguration
    const SHEET_ID = '1vQdYLdafMZAkBfB4kqesOxUDc9QARX8OZjfj35XGQU1M0qd3Uj1aDQBAYWm5YJXj-W3tfamqx-qPhKy';
    // Link für das Blatt "Daten" (GID 0, falls es das erste Blatt ist)
    const URL_DATA = `https://docs.google.com/spreadsheets/d/e/2PACX-${SHEET_ID}/pub?gid=0&output=csv`;

    let allFragen = [];
    let categoryIcons = {};
    let currentFrage, score = 0, answeredCount = 0;
    let isProcessing = false;

    window.onload = loadData;

    async function loadData() {
      try {
        const response = await fetch(URL_DATA);
        const csvText = await response.text();
        
        parseAllData(csvText);
        
        // Warten auf Bilder-Preload (verbessert User Experience)
        await preloadImages();

        document.getElementById('loading-overlay').style.display = 'none';
        renderKategorien();
      } catch (e) {
        console.error("Fehler beim Laden:", e);
        document.getElementById('loading-text').innerText = "Verbindungsfehler!";
        document.getElementById('loading-subtext').innerText = "Bitte Tabelle prüfen (Blattname 'Daten'?) oder Seite neu laden.";
      }
    }

    function parseCSVLine(line) {
      let parts = [];
      let current = '';
      let inQuotes = false;
      for (let char of line) {
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) { parts.push(current.trim().replace(/^"|"$/g, '')); current = ''; }
        else current += char;
      }
      parts.push(current.trim().replace(/^"|"$/g, ''));
      return parts;
    }

    function parseAllData(text) {
      const lines = text.split(/\r?\n/);
      // Header überspringen (i=1)
      for (let i = 1; i < lines.length; i++) {
        const parts = parseCSVLine(lines[i]);
        if (parts.length >= 7) {
          // Fragen-Daten (A bis G)
          const katName = parts[0];
          allFragen.push({
            kat: katName,
            frage: parts[1],
            a: parts[2],
            b: parts[3],
            c: parts[4],
            img: parts[5],
            korrekt: parts[6].toUpperCase().trim(),
            done: false
          });

          // Kategorie-Symbole aus Spalte J (Index 9) und K (Index 10) extrahieren
          // Index 9 ist Spalte J, Index 10 ist Spalte K
          if (parts[9] && parts[10]) {
            categoryIcons[parts[9]] = parts[10];
          }
        }
      }
    }

    async function preloadImages() {
      const urls = [...new Set(allFragen.map(f => f.img).filter(u => u && u.startsWith('http')))];
      const promises = urls.map(url => {
        return new Promise(resolve => {
          const img = new Image();
          img.src = url;
          img.onload = resolve;
          img.onerror = resolve; // Auch bei Fehlern fortfahren
        });
      });
      // Timeout nach 5 Sekunden, falls ein Server langsam ist
      await Promise.race([
        Promise.all(promises),
        new Promise(r => setTimeout(r, 5000))
      ]);
    }

    function renderKategorien() {
      const list = document.getElementById('kat-list');
      list.innerHTML = '';
      const uniqueKats = [...new Set(allFragen.map(f => f.kat))];
      
      uniqueKats.forEach(k => {
        const offen = allFragen.filter(f => f.kat === k && !f.done).length;
        const btn = document.createElement('button');
        btn.className = 'kat-btn' + (offen === 0 ? ' disabled' : '');
        
        // Symbol finden (aus Spalte K) oder Fallback
        const symbol = categoryIcons[k] || "❓";
        
        btn.innerHTML = `<span class="symbol">${symbol}</span><span class="kat-name">${k}</span>`;
        btn.onclick = () => { if(offen > 0) startFrage(k); };
        list.appendChild(btn);
      });
      showScreen('screen-kat');
    }

    function startFrage(katName) {
      const pool = allFragen.filter(f => f.kat === katName && !f.done);
      currentFrage = pool[Math.floor(Math.random() * pool.length)];
      isProcessing = false;
      
      document.getElementById('frage-kat-title').innerText = katName;
      document.getElementById('frage-text').innerText = currentFrage.frage;
      document.getElementById('optA').innerText = currentFrage.a;
      document.getElementById('optB').innerText = currentFrage.b;
      document.getElementById('optC').innerText = currentFrage.c;
      
      const imgTag = document.getElementById('frage-img');
      const imgCont = document.getElementById('img-container');
      
      ['A', 'B', 'C'].forEach(l => {
        const b = document.getElementById('btn-' + l);
        b.className = 'opt-btn';
        b.disabled = false;
      });

      if (currentFrage.img && currentFrage.img.trim().startsWith('http')) {
        imgTag.style.opacity = '0';
        imgTag.src = currentFrage.img.trim();
        imgCont.style.display = 'flex';
        imgTag.onload = () => { imgTag.style.opacity = '1'; };
        imgTag.onerror = () => { imgCont.style.display = 'none'; };
      } else {
        imgCont.style.display = 'none';
      }
      showScreen('screen-frage');
    }

    function handleSelect(choice) {
      if (isProcessing) return;
      isProcessing = true;

      const korrekt = currentFrage.korrekt;
      
      ['A', 'B', 'C'].forEach(l => {
        const b = document.getElementById('btn-' + l);
        b.disabled = true;
        if (l === korrekt) {
          b.classList.add('correct');
        } else if (l === choice) {
          b.classList.add('wrong');
        }
      });

      if (choice === korrekt) score++;
      answeredCount++;
      currentFrage.done = true;
      
      updateUI();
      
      setTimeout(() => {
        if (answeredCount >= 30 || allFragen.every(f => f.done)) {
          showResult();
        } else {
          renderKategorien();
        }
      }, 1600);
    }

    function updateUI() {
      document.getElementById('score').innerText = score;
      document.getElementById('answered-count').innerText = answeredCount;
      const progress = Math.min((answeredCount / 30) * 100, 100);
      document.getElementById('progress-bar').style.width = progress + '%';
    }

    function showResult() {
      document.getElementById('final-score').innerText = score;
      showScreen('screen-result');
    }

    function showScreen(id) {
      ['screen-kat', 'screen-frage', 'screen-result'].forEach(s => document.getElementById(s).style.display = 'none');
      document.getElementById(id).style.display = 'flex';
    }
  </script>
</body>
</html>
